<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventura de Programación Móvil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='estilo.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Programación Móvil – La Aventura</h1>
            <nav>
                <a href="{{ url_for('index') }}"> Mapa</a> |
                <a href="{{ url_for('reset') }}"> Reiniciar</a>
            </nav>
        </header>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <ul class="flashes">
                {% for category, message in messages %}
                    <li class="{{ category }}">{{ message }}</li>
                {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
